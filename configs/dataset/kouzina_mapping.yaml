# Mapeamento inicial Kouzina -> Amazon Reviews 2023 Home_and_Kitchen
# Baseado em validacao por amostra de 50.000 metadados em 2026-06-30.
# Este arquivo define filtros exploratorios; nao implementa regra fuzzy definitiva.

dataset:
  name: Amazon Reviews 2023 - Home_and_Kitchen
  source_page: https://amazon-reviews-2023.github.io/
  reviews_url: https://mcauleylab.ucsd.edu/public_datasets/data/amazon_2023/raw/review_categories/Home_and_Kitchen.jsonl.gz
  metadata_url: https://mcauleylab.ucsd.edu/public_datasets/data/amazon_2023/raw/meta_categories/meta_Home_and_Kitchen.jsonl.gz
  validated_at: "2026-06-30"
  evidence_sample_size: 50000

join_keys:
  interaction_user_key: user_id
  review_item_key: parent_asin
  metadata_item_key: parent_asin
  note: "Usar parent_asin para ligar reviews e metadados; asin aparece nas reviews, mas nao foi observado como chave dos metadados."

field_policy:
  category_fields:
    - categories
    - main_category
  text_fields:
    - title
    - features
    - description
    - details
    - store
  product_quality_fields:
    - average_rating
    - rating_number
  premium_candidate_fields:
    - price
    - average_rating
    - rating_number
    - store
    - title
    - features
    - description
    - details
  warnings:
    - "price e incompleto; nao usar como filtro obrigatorio universal."
    - "store pode representar loja/marca textual, mas precisa limpeza antes de ser tratado como marca."
    - "description e features podem vir vazios."
    - "termos como premium, luxury, modern, chrome e matte black podem gerar falsos positivos."

